<!DOCTYPE html>
<html lang="fr">
<head>
        <meta charset="utf-8">
        <title>!?</title>
        <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>
<style>
     p {
     font-size: 4em;
    }
    .gradient-text {
        background: linear-gradient(180deg, rgb(0, 255, 64), rgb(0, 255, 191));
        -webkit-background-clip: text; /* Préfixe pour Safari et Chrome */
        background-clip: text;
        color: transparent;
    }
      body {
        background: linear-gradient(180deg, rgb(255, 0, 64), rgb(255, 0, 191));
        text-align: center;
        margin: 0.5em 0;
        line-height: 1.5;
        font-family: "Anton", sans-serif;
       }
       html, body {
        height: 100%;
        margin: 0;
       }
       #boutonnon {
            position: absolute;
            top: 50%;
            left: 50%;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: white
       }
</style>
<body>
        <p class="gradient-text">Tu arrives au palier de ma cave est tu sur de vouloir y entrer ? </p>
        <button onclick="window.location.href ='https://kikoofurtif.github.io/kikoo_futif.com/image.jfif'">oui</button>
        <button id="boutonnon">non</button>
        <script>
        const bouton = document.getElementById('boutonnon');
        
        document.addEventListener('mousemove', (souris) => {
            const rect = bouton.getBoundingClientRect();
            const distance = Math.sqrt(
                Math.pow(souris.clientX - (rect.left + rect.width / 2), 2) +
                Math.pow(souris.clientY - (rect.top + rect.height / 2), 2)
            );
            
            if (distance < 100) {
                const newTop = Math.random() * (window.innerHeight - rect.height);
                const newLeft = Math.random() * (window.innerWidth - rect.width);
                
                bouton.style.top = newTop + 'px';
                bouton.style.left = newLeft + 'px';
            }
        });
    </script>
</body>
</html>
