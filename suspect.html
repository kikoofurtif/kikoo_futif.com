<!DOCTYPE html>
<html lang="fr">
<head>
        <meta charset="utf-8">
        <title>!?</title>
        <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="syle2.css">
</head>
<body>
        <p class="gradient-text">Tu arrives au palier de ma cave est tu sur de vouloir y entrer ? </p>
        <button onclick="window.location.href ='https://kikoofurtif.github.io/kikoo_futif.com/image.jfif'">oui</button>
        <button id="boutonnon">non</button>
        <script>
        const bouton = document.getElementById('boutonnon');
        
        document.addEventListener('mousemove', (souris) => {
            const rect = bouton.getBoundingClientRect();
            const distance = Math.sqrt(
                Math.pow(souris.clientX - (rect.left + rect.width / 2), 2) +
                Math.pow(souris.clientY - (rect.top + rect.height / 2), 2)
            );
            
            if (distance < 100) {
                const newTop = Math.random() * (window.innerHeight - rect.height);
                const newLeft = Math.random() * (window.innerWidth - rect.width);
                
                bouton.style.top = newTop + 'px';
                bouton.style.left = newLeft + 'px';
            }
        });
    </script>
</body>
</html>
